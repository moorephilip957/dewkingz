<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in to your account</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <!-- <link rel="stylesheet" href="style.css" /> -->

  <style>
    body {
  margin: 0;
  padding: 0;
  background-color: #f2f2f2;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* Main wrapper */
.main-container {
  width: 100%;
  max-width: 440px;
}

/* Login Card */
.login-card {
  background: #fff;
  padding: 44px;
  margin-bottom: 16px;
}

/* Logo */
.logo {
  width: 108px;
  margin-bottom: 16px;
}

/* Title */
.title {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #1b1b1b;
}

/* Input */
.custom-input {
  border: none;
  border-bottom: 1px solid #666;
  border-radius: 0;
  padding-left: 0;
  box-shadow: none !important;
}

.custom-input:focus {
  border-bottom: 2px solid #0067b8;
}

/* Small text */
.small-text {
  font-size: 13px;
  color: #555;
}

.small-text a {
  text-decoration: none;
  color: #0067b8;
}

.small-text a:hover {
  text-decoration: underline;
}

/* Button */
.next-btn {
  background-color: #0067b8;
  color: white;
  border: none;
  border-radius: 0;
  width: 108px;
  height: 32px;
  font-size: 15px;
}

.next-btn:hover {
  background-color: #005da6;
  color: white;
}

/* Sign in options */
.signin-options {
  background: white;
  padding: 14px 20px;
  cursor: pointer;
  font-size: 15px;
}

.signin-options:hover {
  background-color: #f5f5f5;
}

/* Mobile */
@media (max-width: 576px) {

  body {
    background: white;
    align-items: flex-start;
  }

  .login-card {
    box-shadow: none !important;
    padding: 24px;
  }

  .signin-options {
    box-shadow: none !important;
  }
}
  </style>
</head>
<body>

  <div class="main-container">

    <!-- Login Card -->
    <div class="login-card shadow-sm">

      <!-- Microsoft Logo -->
      <div class="logo-container">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
          alt="Microsoft"
          class="logo"
        />
      </div>

      <!-- Title -->
      <h2 class="title">Sign in</h2>

      <!-- Form -->
      <form>

        <div class="mb-3">
          <input
            type="email"
            class="form-control custom-input"
            placeholder="Email, phone, or Skype"
          />
        </div>

        <!-- Links -->
        <div class="small-text mb-3">
          No account?
          <a href="#">Create one!</a>
        </div>

        <div class="small-text mb-4">
          <a href="#">Can't access your account?</a>
        </div>

        <!-- Button -->
        <div class="d-flex justify-content-end">
          <button type="submit" class="btn next-btn">
            Next
          </button>
        </div>

      </form>
    </div>

    <!-- Sign-in options -->
    <div class="signin-options shadow-sm">
      <span class="key-icon">🔑</span>
      Sign-in options
    </div>

  </div>

</body>
</html>
