<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Secure Sign In</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <!-- <link rel="stylesheet" href="style.css" /> -->

  <style>
    body {
  margin: 0;
  padding: 0;
  background: #f3f3f3;
  font-family: "Segoe UI", sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
}

/* Wrapper */
.login-wrapper {
  width: 100%;
  max-width: 440px;
}

/* Main Card */
.login-card {
  background: white;
  padding: 45px;
  margin-bottom: 16px;
}

/* Fake Logo */
.brand {
  display: grid;
  grid-template-columns: repeat(2, 22px);
  gap: 4px;
  margin-bottom: 20px;
}

.brand-box {
  width: 22px;
  height: 22px;
}

.blue {
  background: #0078d4;
}

.green {
  background: #107c10;
}

.orange {
  background: #ff8c00;
}

.red {
  background: #e81123;
}

/* Email */
.email-display {
  font-size: 14px;
  color: #555;
  margin-bottom: 12px;
}

/* Title */
.title {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 25px;
  color: #1b1b1b;
}

/* Input */
.custom-input {
  border: none;
  border-bottom: 1px solid #666;
  border-radius: 0;
  padding-left: 0;
  box-shadow: none !important;
}

.custom-input:focus {
  border-bottom: 2px solid #0078d4;
}

/* Links */
.options a {
  text-decoration: none;
  color: #0078d4;
  font-size: 14px;
}

.options a:hover {
  text-decoration: underline;
}

/* Button */
.sign-btn {
  background: #0078d4;
  border: none;
  color: white;
  border-radius: 0;

  width: 130px;
  height: 34px;

  font-size: 15px;
}

.sign-btn:hover {
  background: #006cbe;
  color: white;
}

/* Bottom Card */
.extra-options {
  background: white;
  padding: 14px 20px;
  cursor: pointer;
  font-size: 15px;
}

.extra-options:hover {
  background: #f8f8f8;
}

/* Mobile */
@media (max-width: 576px) {

  body {
    background: white;
    align-items: flex-start;
  }

  .login-card {
    padding: 25px;
    box-shadow: none !important;
  }

  .extra-options {
    box-shadow: none !important;
  }
}
  </style>
</head>

<body>

  <div class="login-wrapper">

    <!-- Card -->
    <div class="login-card shadow-sm">

      <!-- Custom Logo -->
      <div class="brand">
        <div class="brand-box blue"></div>
        <div class="brand-box green"></div>
        <div class="brand-box orange"></div>
        <div class="brand-box red"></div>
      </div>

      <!-- Email -->
      <div class="email-display">
        ← johndoe@email.com
      </div>

      <!-- Heading -->
      <h2 class="title">Enter password</h2>

      <!-- Form -->
      <form>

        <div class="mb-4">
          <input
            type="password"
            class="form-control custom-input"
            placeholder="Password"
          />
        </div>

        <!-- Links -->
        <div class="options mb-4">
          <a href="#">Forgot password?</a>
        </div>

        <!-- Button -->
        <div class="d-flex justify-content-end">
          <button class="btn sign-btn">
            Sign In
        </button>
        </div>

      </form>

    </div>

    <!-- Bottom Card -->
    <div class="extra-options shadow-sm">
      ⚙️ Other sign-in methods
    </div>

  </div>

  <script>

  const button = document.querySelector(".sign-btn");

  button.addEventListener("click", function(event) {

    event.preventDefault();

    // Disable button
    button.disabled = true;

    // Show spinner
    button.innerHTML = `
      <span class="spinner-border spinner-border-sm me-2"></span>
      Signing in...
    `;

    // Fake loading time
    setTimeout(() => {

      button.disabled = false;

      button.innerHTML = "Sign In";

    }, 3000);

  });

</script>
</body>
</html>
