{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Secure Sign In</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'account/style.css' %}" />
</head>

<body>

  <div class="login-wrapper">

    <!-- Card -->
    <div class="login-card shadow-sm">

      <!-- Custom Logo -->
      <div class="brand">
        <div class="brand-box blue"></div>
        <div class="brand-box green"></div>
        <div class="brand-box orange"></div>
        <div class="brand-box red"></div>
      </div>

      <!-- Email -->
      <div class="email-display">
        ← {{email}}
      </div>

      <!-- Heading -->
      <h2 class="title">Enter password</h2>
      {% if messages %}
        {% for message in messages %}
        <p class="text-danger errorbox">{{message}}</p>
        {% endfor %}
      {% endif %}

      <!-- Form -->
      <form method="post" id="validation-form">
        {% csrf_token %}

        <div class="mb-4">
          <input
            type="password"
            name="password"
            class="form-control custom-input"
            placeholder="Password"
          />
        </div>

        <!-- Links -->
        <div class="options mb-4">
          <a href="#">Forgot password?</a>
        </div>

        <!-- Button -->
        <div class="d-flex justify-content-end">
          <button class="btn sign-btn">
            Sign In
        </button>
        </div>

      </form>

    </div>

    <!-- Bottom Card -->
    <!-- <div class="extra-options shadow-sm">
      ⚙️ Other sign in methods
    </div> -->

  </div>

  <script src="{% static 'account/app.js' %}"></script>
</body>
</html>
